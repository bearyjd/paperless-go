License: AGPL-3.0-only
AuthorName: bearyjd
WebSite: https://github.com/bearyjd/paperless-go
SourceCode: https://github.com/bearyjd/paperless-go
IssueTracker: https://github.com/bearyjd/paperless-go/issues

Name: Paperless Go
AutoName: Paperless Go

RepoType: git
Repo: https://github.com/bearyjd/paperless-go.git

Builds:
  - versionName: 1.1.0
    versionCode: 5
    commit: 7240e2e64cc50b5d548d3c9fa0ad5df3f27e3bf5
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - sed -i '/google_mlkit/d' pubspec.yaml
      - grep -q google_mlkit pubspec.yaml && exit 1 || true
      - sed -i '/cunning_document_scanner/d' pubspec.yaml
      - grep -q cunning_document_scanner pubspec.yaml && exit 1 || true
      - cp lib/features/scanner/processing/mlkit_deskew_stub.dart lib/features/scanner/processing/mlkit_deskew.dart
      - cp lib/features/scanner/processing/ocr_extractor_stub.dart lib/features/scanner/processing/ocr_extractor.dart
      - cp lib/features/scanner/document_scanner_stub.dart lib/features/scanner/document_scanner.dart
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter pub get
      - echo 'android.dependenciesInfo.enabled=false' >> android/gradle.properties
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.0
CurrentVersionCode: 5

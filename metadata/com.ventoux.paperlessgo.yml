Name: Paperless Go
Summary: A modern mobile client for Paperless-ngx

Description: |
  Paperless Go is a mobile client for Paperless-ngx, the popular self-hosted
  document management system.

  Manage your documents on the go with a clean, modern interface:
  * Browse, search, and filter your document library
  * View document details, thumbnails, and PDF previews
  * Upload new documents via camera scan or file picker
  * Receive shared files from other apps for quick upload
  * Manage tags, correspondents, document types, and storage paths
  * Edit document metadata and custom fields
  * Create and manage custom field definitions
  * Dashboard with library statistics overview
  * Saved views: create, apply, rename, and delete filter sets
  * Workflows: view, toggle, and delete automation rules
  * PDF tools: rotate, split, compress, password protect, annotate, and redact
  * Bulk operations: tag, re-tag, delete, merge, and more
  * Biometric authentication for secure access
  * Offline-capable with full SQLite caching
  * Full-text search with autocomplete

  Paperless Go connects to your self-hosted Paperless-ngx server using
  token-based authentication. You need a running Paperless-ngx instance
  to use this app.

  Note: The F-Droid build does not include Google ML Kit (proprietary).
  Document deskew uses a pure-Dart algorithm and OCR-based metadata
  suggestions are disabled.

RepoType: git
Repo: https://github.com/bearyjd/paperless-go.git

Builds:
  - versionName: 1.0.3
    versionCode: 4
    commit: v1.0.3
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - sed -i '/google_mlkit/d' pubspec.yaml
      - grep -q google_mlkit pubspec.yaml && exit 1 || true
      - cp lib/features/scanner/processing/mlkit_deskew_stub.dart lib/features/scanner/processing/mlkit_deskew.dart
      - cp lib/features/scanner/processing/ocr_extractor_stub.dart lib/features/scanner/processing/ocr_extractor.dart
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/flutter build apk --release


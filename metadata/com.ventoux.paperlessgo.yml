MaintainerNotes: |-
  Flutter app with ABI splits. Version code scheme:
  baseVersionCode * 10 + abiCode, where
  abiCodes: armeabi-v7a=1, arm64-v8a=2, x86_64=3.

AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
  - '%c * 10 + 1'
  - '%c * 10 + 2'
  - '%c * 10 + 3'
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.2
CurrentVersionCode: 73
